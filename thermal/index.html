<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Thermal Printer Composer</title>
<!-- PWA / installable: lets the UI be added to the iPhone home screen and run offline -->
<meta name="theme-color" content="#0e0f13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Thermal">
<link rel="apple-touch-icon" id="tpAppleIcon">
<link rel="icon" id="tpFavicon">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  .tp-root{
    --bg:#0e0f13;--surface:#14161c;--surface2:#181b22;--line:#1c1e25;--line2:#262a33;
    --text:#e7e9ee;--muted:#868d9b;--faint:#5a6170;
    --accent:#e8893a;--accent2:#d6772a;--onacc:#1a1206;
    --paper:#fffdf2;--ink:#14120b;--good:#7ee787;--bad:#ff7b72;
    height:100vh;display:flex;flex-direction:column;overflow:hidden;
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;font-size:13px;
    background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;
  }
  .tp-root *{scrollbar-width:thin;scrollbar-color:#2a2e38 transparent}
  .tp-root *::-webkit-scrollbar{width:9px;height:9px}
  .tp-root *::-webkit-scrollbar-thumb{background:#262a33;border-radius:6px}
  .tpf{font:inherit;color:var(--text);background:#0f1116;border:1px solid var(--line2);border-radius:8px;padding:9px 11px;outline:none;transition:border-color .12s,box-shadow .12s}
  .tpf:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,137,58,.16)}
  .tpf::placeholder{color:#4d5462}
  textarea.tpf{width:100%;min-height:66px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12.5px;line-height:1.45}
  .tp-root button{font:inherit;cursor:pointer}
  .btn{font-size:13px;padding:8px 13px;border:1px solid var(--line2);background:var(--surface2);color:var(--text);border-radius:8px;transition:border-color .12s,background .12s,transform .05s;white-space:nowrap}
  .btn:hover{border-color:#3a4150}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:var(--onacc);font-weight:700}
  .btn.primary:hover{background:var(--accent2);border-color:var(--accent2)}
  .btn.ghost{background:transparent;color:var(--muted)}
  .btn.ghost:hover{color:var(--text)}
  .btn.danger{color:var(--bad);border-color:#3a2a2c;background:transparent}
  .btn.danger:hover{border-color:var(--bad)}
  .tile{display:flex;flex-direction:column;gap:9px;align-items:flex-start;padding:11px;border:1px solid var(--line);border-radius:10px;background:var(--surface2);cursor:pointer;transition:border-color .12s,background .12s,transform .05s;text-align:left}
  .tile:hover{border-color:var(--accent);background:#1d2026}
  .tile:active{transform:translateY(1px)}
  .tile .g{font-size:16px;line-height:1;color:#aab1c0;font-family:ui-monospace,monospace}
  .tile .l{font-size:12px;color:#cdd2db;font-weight:600;line-height:1.1}
  .seg{display:flex;border:1px solid var(--line2);border-radius:8px;overflow:hidden}
  .seg button{flex:1;border:0;border-right:1px solid var(--line2);background:#0f1116;color:var(--muted);padding:7px 9px;font-size:12px}
  .seg button:last-child{border-right:0}
  .seg button:hover{color:var(--text)}
  .seg button.active{background:var(--accent);color:var(--onacc);font-weight:700}
  .tog{border:1px solid var(--line2);background:#0f1116;color:var(--muted);border-radius:8px;padding:8px 13px;font-size:12px}
  .tog:hover{color:var(--text)}
  .tog.active{background:var(--accent);border-color:var(--accent);color:var(--onacc);font-weight:700}
  .flab{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#707888;font-weight:600}
  .libcat{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#5f6675;font-weight:700;margin:16px 2px 9px}
  .libcat:first-child{margin-top:2px}
  .chip{display:flex;align-items:center;gap:7px;padding:5px 10px;background:var(--surface2);border:1px solid var(--line2);border-radius:20px}
  .dot{width:7px;height:7px;border-radius:50%;background:#7ee787;animation:pulse 2.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .prevItem{position:relative;cursor:pointer;border-radius:4px}
  .prevItem .grip{position:absolute;left:-16px;top:0;bottom:0;width:14px;display:none;align-items:center;justify-content:center;color:#b8b09a;cursor:grab;font-size:12px}
  .prevItem:hover .grip{display:flex}
  .prevItem.sel{outline:2px solid var(--accent);outline-offset:3px;background:rgba(232,137,58,.07)}
  .prevItem.drag{opacity:.4}
  .progress{height:6px;background:#0f1116;border:1px solid var(--line2);border-radius:4px;overflow:hidden}
  .progress > i{display:block;height:100%;width:0;background:var(--accent);transition:width .25s ease}

  /* ===== Mobile layout: one pane at a time, with a bottom tab bar ===== */
  /* CSS-only view switcher — hidden entirely on desktop (no JS/logic changes). */
  .tpView{display:none}
  .tpTabs{display:none}
  @media (max-width:760px){
    .tp-root{height:100vh;height:100dvh}

    /* --- Top bar: two tidy rows, clear of the iOS status bar / notch --- */
    .tp-header{
      flex-wrap:wrap;gap:8px 10px !important;
      padding:calc(9px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) 9px calc(14px + env(safe-area-inset-left)) !important;
    }
    /* Row 1: title (left) + status & Print (right). Row 2: IP, Ping, Polaroid. */
    .tp-header > div:first-child{flex:1 1 auto;min-width:0}   /* title grows, pushes Print right */
    .tp-header .chip{order:1;flex:1 1 180px;margin-left:0 !important} /* IP field grows on row 2 */
    #tpPing{order:1}
    #tpPolaroid{order:1}
    #tpBaseUrl{flex:1 1 auto;width:auto !important;min-width:0}
    .tp-header #tpStatus{max-width:130px !important}

    /* --- Collapse the 3 columns into a single swappable pane --- */
    .tp-grid{grid-template-columns:1fr !important;grid-template-rows:minmax(0,1fr) !important;min-height:0}
    .tp-pane{display:none !important;border:0 !important;min-width:0;min-height:0}
    #tpViewLib:checked   ~ .tp-grid .tp-pane-lib{display:flex !important}
    #tpViewPaper:checked ~ .tp-grid .tp-pane-paper{display:flex !important}
    #tpViewInsp:checked  ~ .tp-grid .tp-pane-insp{display:flex !important}

    /* --- Paper toolbar: wrap neatly, drop the desktop divider rules --- */
    .tp-paper-toolbar{gap:6px !important;padding:8px 12px !important}
    .tp-paper-toolbar .btn{padding:7px 10px}
    .tp-div{display:none !important}
    #tpTest{margin-left:0 !important}

    /* --- Paper: scaled with JS (--tp-fit) so the true 384px print width
           always fits the screen — no horizontal panning --- */
    .tp-paper-scroll{padding:14px 12px calc(24px + env(safe-area-inset-bottom)) !important}
    #tpPaper{zoom:var(--tp-fit,1)}

    /* --- Bottom tab bar --- */
    .tpTabs{
      display:flex;border-top:1px solid var(--line);background:#101218;gap:6px;
      padding:6px calc(8px + env(safe-area-inset-right)) calc(6px + env(safe-area-inset-bottom)) calc(8px + env(safe-area-inset-left));
    }
    .tpTabs label{
      flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
      padding:11px 6px;border-radius:9px;font-size:12.5px;font-weight:600;
      color:var(--muted);border:1px solid var(--line2);background:#0f1116;
      cursor:pointer;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
    }
    .tpTabs label::before{font-size:13px;opacity:.85}
    .tpTabs label[for=tpViewLib]::before{content:"\25A4"}
    .tpTabs label[for=tpViewPaper]::before{content:"\25AF"}
    .tpTabs label[for=tpViewInsp]::before{content:"\270E"}
    #tpViewLib:checked   ~ .tpTabs label[for=tpViewLib],
    #tpViewPaper:checked ~ .tpTabs label[for=tpViewPaper],
    #tpViewInsp:checked  ~ .tpTabs label[for=tpViewInsp]{background:var(--accent);border-color:var(--accent);color:var(--onacc)}
  }
</style>
</head>
<body>
<div class="tp-root">
  <!-- ===== TOP BAR ===== -->
  <header class="tp-header" style="display:flex;align-items:center;gap:14px;padding:11px 16px;border-bottom:1px solid var(--line);background:#101218;">
    <div style="display:flex;align-items:center;gap:9px;">
      <span style="width:9px;height:9px;border-radius:2px;background:var(--accent);"></span>
      <span style="font-size:13px;font-weight:700;letter-spacing:.02em;">Thermal Composer</span>
    </div>
    <div class="chip" style="margin-left:6px;">
      <span class="dot" id="tpDot"></span>
      <input class="tpf" id="tpBaseUrl" placeholder="http://192.168.1.123" autocomplete="off" style="border:0;background:transparent;padding:0;width:178px;font-family:ui-monospace,monospace;font-size:12px;border-radius:0;">
    </div>
    <button class="btn ghost" id="tpPing">Ping</button>
    <button class="btn ghost" id="tpPolaroid" title="One-tap photo printing (portable kit)">📷 Polaroid</button>
    <div style="margin-left:auto;display:flex;align-items:center;gap:10px;">
      <span id="tpStatus" style="font-size:12px;color:var(--muted);max-width:320px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
      <button class="btn primary" id="tpPrint" style="padding:8px 20px;">Print</button>
    </div>
  </header>

  <!-- Mobile view switcher (CSS-only; has no effect on desktop) -->
  <input class="tpView" type="radio" name="tpView" id="tpViewLib">
  <input class="tpView" type="radio" name="tpView" id="tpViewPaper" checked>
  <input class="tpView" type="radio" name="tpView" id="tpViewInsp">

  <!-- ===== MAIN 3-COLUMN ===== -->
  <div class="tp-grid" style="flex:1;display:grid;grid-template-columns:236px 1fr 310px;min-height:0;">

    <!-- LIBRARY -->
    <aside class="tp-pane tp-pane-lib" style="border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;background:#101218;">
      <div style="padding:14px 14px 10px;border-bottom:1px solid var(--line);">
        <input class="tpf" id="tpSearch" placeholder="Search blocks…" style="width:100%;font-size:13px;">
      </div>
      <div id="tpLibrary" style="flex:1;overflow:auto;padding:6px 14px 18px;"></div>
    </aside>

    <!-- PAPER -->
    <section class="tp-pane tp-pane-paper" style="display:flex;flex-direction:column;min-height:0;">
      <div class="tp-paper-toolbar" style="display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap;">
        <button class="btn ghost" id="tpDemo">Demo</button>
        <button class="btn ghost" id="tpClear">Clear</button>
        <div class="tp-div" style="width:1px;align-self:stretch;background:var(--line2);margin:0 4px;"></div>
        <button class="btn ghost" id="tpSave">Save JSON</button>
        <button class="btn ghost" id="tpLoad">Load JSON</button>
        <input type="file" accept="application/json" style="display:none" id="tpLoadFile">
        <div class="tp-div" style="width:1px;align-self:stretch;background:var(--line2);margin:0 4px;"></div>
        <span class="flab" style="margin:0 2px;">Feed</span>
        <div class="seg" id="tpFeedMode" title="How blank space (feed / after) is sent. Newlines work on cheap clones; Dots use ESC J for exact spacing.">
          <button data-mode="nl">⏎ Newlines</button>
          <button data-mode="dots">⋮ Dots</button>
        </div>
        <button class="btn ghost" id="tpTest" style="margin-left:auto;">Printer self-test</button>
      </div>
      <div style="padding:8px 16px 0;">
        <div class="progress" id="tpProgress" hidden><i id="tpProgressFill"></i></div>
      </div>
      <div class="tp-paper-scroll" style="flex:1;overflow:auto;background:#0b0c10;padding:28px 24px 60px;display:flex;justify-content:center;align-items:flex-start;">
        <div id="tpPaper" style="flex:none;width:432px;min-height:560px;margin:0 auto;background:var(--paper);color:var(--ink);box-shadow:0 12px 40px rgba(0,0,0,.5);border-radius:3px;padding:18px 24px 40px;overflow:hidden;font-family:'Courier New',ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.12;"></div>
      </div>
    </section>

    <!-- INSPECTOR -->
    <aside class="tp-pane tp-pane-insp" style="border-left:1px solid var(--line);display:flex;flex-direction:column;min-height:0;background:#101218;">
      <div id="tpInspector" style="flex:1;overflow:auto;display:flex;flex-direction:column;"></div>
    </aside>

  </div>

  <!-- Mobile bottom tab bar (CSS-only; hidden on desktop) -->
  <nav class="tpTabs">
    <label for="tpViewLib">Blocks</label>
    <label for="tpViewPaper">Paper</label>
    <label for="tpViewInsp">Edit</label>
  </nav>
</div>

<script>
/* ===== Ported engine (composer-engine.js), inlined verbatim ===== */
/* ============================================================
   THERMAL PRINTER COMPOSER — engine (vanilla controller)
   Faithful port of the original tool's engine, re-housed in a
   Library / Paper / Inspector shell. Output JSON is byte-for-byte
   compatible with code.py. Exposes window.mountThermalComposer(els).
   ============================================================ */
(function () {
const PRINTER_WIDTH = 384;
const FONT_A_DOT_W = 12, FONT_A_DOT_H = 24, FONT_B_DOT_W = 9, FONT_B_DOT_H = 17;
const MAX_BODY_BYTES = 90000;
const COLS_A = 32;
const CODE39_ALLOWED = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ -. $/+%";

const TYPE_LABEL = {
  text:'Text', ascii:'ASCII / CP437', box:'Box', qr:'QR code', barcode:'Barcode',
  image:'Image', rule:'Rule', feed:'Feed', vertical:'Vertical big text', columns:'Columns',
  section:'Section divider', table:'Table', list:'List', keyvalue:'Key / value',
  paragraph:'Paragraph', heading:'Heading', signature:'Signature', tearoff:'Tear-off divider',
  rating:'Rating / bar', chart:'Bar chart', cut:'Paper cut', raw:'Raw ESC/POS'
};
const TYPE_ICON = {
  text:'T', ascii:'/\\', box:'\u25AD', qr:'\u25A6', barcode:'|||', image:'\u25A2', rule:'\u2014', feed:'\u2193',
  vertical:'\u2195', columns:'\u25A5', section:'\u00A7', table:'\u25A4', list:'\u2022', keyvalue:'\u22EF', paragraph:'\u00B6',
  heading:'H', signature:'\u270E', tearoff:'\u2504', rating:'\u2605', chart:'\u25AE', cut:'\u2702', raw:'#'
};

const LIBRARY = [
  ['Common', ['text','heading','qr','barcode','image','paragraph']],
  ['Text & art', ['text','ascii','box','vertical']],
  ['Codes & image', ['qr','barcode','image']],
  ['Layout', ['rule','feed','section','tearoff','signature','columns']],
  ['Data & tables', ['table','list','keyvalue','rating','chart']],
];

const defaults = {
  text: () => ({ type:'text', text:'EPWA 161500Z 25015KT 9999 FEW042 18/08 Q1014 NOSIG', width:1, height:1, bold:false, underline:0, inverse:false, justify:'left', font:'a', encoding:'cp437', after:0 }),
  ascii: () => ({ type:'ascii', text:'/\\_/\\\n( o.o )\n > ^ <', width:1, height:1, bold:false, underline:0, inverse:false, justify:'left', font:'a', encoding:'cp437', after:0 }),
  box: () => ({ type:'box', text:'HELLO EPWA\nprinter real', padding:1, align:'center', justify:'left', ascii:false, after:0 }),
  qr: () => ({ type:'qr', data:'https://thefilip.com', size:5, ecc:'M', justify:'center', after:1, asImage:false }),
  barcode: () => ({ type:'barcode', data:'EPWA123', kind:'code39', bar_width:2, bar_height:80, hri:'below', justify:'center', after:1, asImage:false }),
  image: () => ({ type:'image', width:PRINTER_WIDTH, height:0, data:'', dither:'threshold', threshold:150, brightness:0, maxHeight:384, invert:false, after:1, filename:'', rotate:0, scale:100, imgAlign:'center', crop:null, brightRegion:null }),
  rule: () => ({ type:'rule', char:'-', width:32, justify:'left', cp437:false, after:0 }),
  feed: () => ({ type:'feed', lines:3 }),
  vertical: () => ({ type:'vertical', text:'HELLO', mode:'stack', width:2, height:2, bold:false, justify:'center', space_lines:1, after:1 }),
  columns: () => ({ type:'columns', cells:[{ text:'Item', align:'left', width:0 }, { text:'$0.00', align:'right', width:0 }], gap:1, encoding:'cp437', after:0 }),
  section: () => ({ type:'section', title:'SECTION', char:'=', cp437:false, after:0 }),
  table: () => ({ type:'table', rows:['Item|Qty|Price','Coffee|2|$5.00','Cake|1|$3.50'], header:true, aligns:'LCR', gap:1, encoding:'cp437', after:1 }),
  list: () => ({ type:'list', text:'Fuel\nFlaps\nLights', style:'checkbox', justify:'left', encoding:'cp437', after:1 }),
  keyvalue: () => ({ type:'keyvalue', text:'Flight: LO282\nGate: 12\nBoarding: 14:30', sep:':', leader:'.', encoding:'cp437', after:1 }),
  paragraph: () => ({ type:'paragraph', text:'This is a longer note that wraps neatly to the paper width without breaking words in the middle.', justify:'left', width:0, encoding:'cp437', after:1 }),
  heading: () => ({ type:'heading', text:'HEADING', size:2, bold:true, rule:true, char:'=', cp437:false, after:1 }),
  signature: () => ({ type:'signature', label:'Signature', after:1 }),
  tearoff: () => ({ type:'tearoff', char:'-', label:'', cp437:false, after:0 }),
  rating: () => ({ type:'rating', mode:'stars', value:4, max:5, width:10, label:'', justify:'left', after:0 }),
  chart: () => ({ type:'chart', data:'3,5,8,4,6,2', width:24, values:true, after:1 }),
};

function numField(key,label,min,max){ return { kind:'number', key, label, min, max }; }
function segField(key,label,options){ return { kind:'seg', key, label, options }; }
function toggleField(key,label,title){ return { kind:'toggle', key, label, title }; }
function inputSpec(key,label){ return { kind:'input', key, label }; }
function alignField(key,label){ return segField(key, label||'Align', [['left','Left'],['center','Center'],['right','Right']]); }

const WMO = {0:'clear',1:'mostly clear',2:'partly cloudy',3:'overcast',45:'fog',48:'rime fog',51:'light drizzle',53:'drizzle',55:'heavy drizzle',61:'light rain',63:'rain',65:'heavy rain',66:'freezing rain',67:'freezing rain',71:'light snow',73:'snow',75:'heavy snow',77:'snow grains',80:'showers',81:'showers',82:'violent showers',85:'snow showers',86:'snow showers',95:'thunderstorm',96:'thunderstorm + hail',99:'thunderstorm + hail'};
function pad2(n){ return String(n).padStart(2,'0'); }
function fmtStamp(d,mode){ const date=d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); const time=pad2(d.getHours())+':'+pad2(d.getMinutes()); if(mode==='date')return date; if(mode==='time')return time; return date+' '+time; }
function counterKey(m){ return 'thermalCounter:'+(m.ctrId||m.label||'default'); }
function counterText(m,v){ const padded=String(v).padStart(Math.max(1,parseInt(m.pad,10)||1),'0'); return (m.label?m.label+' ':'')+(m.prefix||'')+padded; }
function peekCounter(m){ const raw=localStorage.getItem(counterKey(m)); return raw===null?(parseInt(m.start,10)||0):(parseInt(raw,10)||0); }
function bumpCounter(m){ const v=peekCounter(m); localStorage.setItem(counterKey(m),String(v+1)); return v; }
function daysUntil(str){ const t=Date.parse(String(str)+'T00:00:00'); if(isNaN(t)) return null; const now=new Date(); const today=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime(); return Math.round((t-today)/86400000); }

const PLUGINS = [
  { id:'randnum', name:'Random #', blurb:'Generates a fresh random number on every print — raffle tickets, test barcodes, nonces.',
    defaults:{ label:'TICKET', digits:6, as:'barcode', kind:'code39' },
    fields:[ inputSpec('label','Label'), numField('digits','Digits',1,18), segField('as','Show as',[['text','Big text'],['barcode','Barcode'],['qr','QR']]), segField('kind','Barcode',['code39','code128']) ],
    preview(m){ return 'Random '+m.digits+'-digit number as '+m.as+(m.as==='barcode'?' ('+m.kind+')':'')+' — new every print'; },
    async build(m){ const digits=Math.max(1,Math.min(18,parseInt(m.digits,10)||6)); let n=''; for(let i=0;i<digits;i++) n+=Math.floor(Math.random()*10); const out=[]; if(m.label) out.push({type:'text',text:String(m.label),justify:'center',bold:true,after:0}); if(m.as==='qr') out.push({type:'qr',data:n,size:5,ecc:'M',justify:'center',after:1}); else if(m.as==='barcode') out.push({type:'barcode',data:n,kind:m.kind||'code39',bar_width:2,bar_height:80,hri:'below',justify:'center',after:1}); else out.push({type:'text',text:n,width:2,height:2,justify:'center',after:1}); return out; } },
  { id:'randean13', name:'Random EAN-13', blurb:'Generates a fresh, checksum-valid EAN-13 barcode on every print — test scans, mock products, label trials.',
    defaults:{ label:'EAN-13' },
    fields:[ inputSpec('label','Label') ],
    preview(m){ return 'Random EAN-13 barcode'+(m.label?' labelled "'+m.label+'"':'')+' — new every print'; },
    async build(m){ let d=''; for(let i=0;i<12;i++) d+=Math.floor(Math.random()*10); let s=0; for(let i=0;i<12;i++) s+=(+d[i])*(i%2===0?1:3); const code=d+String((10-(s%10))%10); const out=[]; if(m.label) out.push({type:'text',text:String(m.label),justify:'center',bold:true,after:0}); out.push({type:'barcode',data:code,kind:'ean13',bar_width:2,bar_height:80,hri:'below',justify:'center',after:1}); return out; } },
  { id:'datetime', name:'Date/time', blurb:'Stamps the current local date and/or time at the moment you print.',
    defaults:{ label:'', mode:'datetime' },
    fields:[ inputSpec('label','Label'), segField('mode','Show',[['datetime','Date + time'],['date','Date'],['time','Time']]) ],
    preview(m){ return (m.label?m.label+' ':'')+fmtStamp(new Date(),m.mode)+'  (current '+m.mode+' at print)'; },
    async build(m){ const stamp=fmtStamp(new Date(),m.mode); return [{type:'text',text:(m.label?m.label+' ':'')+stamp,justify:'center',after:1}]; } },
  { id:'weather', name:'Weather', blurb:'Live current conditions from open-meteo.com (no API key). Needs the browser online when printing.',

  else if(m.type==='plugin'){ const p=pluginFor(m); const box=document.createElement('div'); box.style.cssText='border:1px dashed rgba(0,0,0,.4);color:rgba(0,0,0,.62);font-style:italic;text-align:center;padding:8px 10px;margin:2px 0;font-size:11px;line-height:1.35;font-family:system-ui;'; box.textContent=p?'\u26A1 '+(p.preview?p.preview(m):p.name):'\u26A1 unknown plugin "'+m.plugin+'"'; item.appendChild(box); }

  if(m.after>0 && m.type!=='feed') item.appendChild(makeFeedPreview(m.after,'after feed('+m.after+')'));
  return item;
}

function moduleToPrint(m){ const out=Object.assign({},m); delete out.id; delete out.previewDataUrl; delete out.filename; delete out.threshold; delete out.brightness; delete out.maxHeight; delete out.invert; delete out.dither; if(out.type==='image'){ delete out.rotate; delete out.scale; delete out.imgAlign; delete out.crop; delete out.brightRegion; } for(const k of Object.keys(out)) if(k.startsWith('_')) delete out[k]; if(out.type==='box'){ out.lines=String(out.text||'').split('\n'); delete out.text; } return out; }
function serializeForSave(m){
  // Unlike moduleToPrint (the wire format), the saved file keeps editor-only
  // settings so an imported job stays fully re-editable. For images that means
  // the transforms and the original source image are persisted too.
  const out=Object.assign({},m);
  delete out.id; delete out.previewDataUrl;
  if(out._sourceDataUrl) out.sourceDataUrl=out._sourceDataUrl;
  for(const k of Object.keys(out)) if(k.startsWith('_')) delete out[k];
  if(out.type==='box'){ out.lines=String(out.text||'').split('\n'); delete out.text; }
  return out;
}
function bytesToBase64(bytes){ let binary=''; const chunk=0x8000; for(let i=0;i<bytes.length;i+=chunk) binary+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunk)); return btoa(binary); }

class App {
  constructor(els){
    this.els=els;
    this.modules=[];
    this.nextId=1;
    this.selectedId=null;
    this.search='';
    this._dragId=null;
    this.feedMode='nl';
    try{ const fm=localStorage.getItem('thermalFeedMode'); if(fm==='dots'||fm==='nl') this.feedMode=fm; }catch(e){}
    this.init();
  }
  init(){
    try{ const saved=localStorage.getItem('thermalPrinterBaseUrl'); if(saved&&this.els.baseUrl) this.els.baseUrl.value=saved; }catch(e){}
    this.setupFeedModeToggle();
    document.addEventListener('keydown',(e)=>this.handleKeyDown(e));
    document.addEventListener('paste',(e)=>this.handlePaste(e));
    this.renderLibrary();
    this.renderPaper();
    this.renderInspector();
    // Polaroid quick-print: open straight into it via #polaroid (an iPhone Shortcut can
    // just open the URL with that hash), and react to hash changes while running.
    window.addEventListener('hashchange',()=>{ if(location.hash==='#polaroid') this.openPolaroid(); else this.closePolaroid(); });
    if(location.hash==='#polaroid') this.openPolaroid();
  }
  handleKeyDown(e){
    if(this._modalOpen) return;
    if(this.selectedId==null) return;
    const t=e.target, tag=t&&t.tagName;
    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'||tag==='BUTTON'||(t&&t.isContentEditable)) return;
    if(e.key==='Delete'||e.key==='Backspace'){ e.preventDefault(); this.deleteModule(this.selectedId); }
  }
  /* Clipboard paste (e.g. "Copy image" from a browser, or a screenshot). Loads into the
     selected image block, or spins up a new image block if none is selected. */
  handlePaste(e){
    // Don't steal pastes aimed at a text field (URL bar, text/paragraph editors, etc).
    const t=e.target, tag=t&&t.tagName;
    if(tag==='TEXTAREA'||(t&&t.isContentEditable)||(tag==='INPUT'&&!/^(file|button|checkbox|radio|range|submit)$/i.test(t.type||'text'))) return;
    const items=e.clipboardData&&e.clipboardData.items; if(!items) return;
    for(const it of items){
      if(it.type&&it.type.indexOf('image')===0){ const file=it.getAsFile(); if(file){ e.preventDefault(); this.acceptImageFile(file); } return; }
    }
  }
  acceptImageFile(file){
    let m=this.modules.find(x=>x.id===this.selectedId);
    // Reuse the selected image block only if it's still empty — otherwise add a new one
    // so a paste never clobbers an image you already placed.
    if(!m||m.type!=='image'||m.data){ this.addModule('image'); m=this.modules.find(x=>x.id===this.selectedId); }
    if(!m) return;
    if(!file.name) try{ Object.defineProperty(file,'name',{value:'pasted.png'}); }catch(_){ }
    this.select(m.id);
    this.convertImageFile(file,m.id);
    this.setStatus('Image added.','ok');
  }
  setupFeedModeToggle(){
    const seg=document.getElementById('tpFeedMode'); if(!seg) return;
    const sync=()=>{ for(const b of seg.children) b.classList.toggle('active', b.dataset.mode===this.feedMode); };
    for(const b of seg.children){ b.onclick=()=>{ this.feedMode=b.dataset.mode; try{ localStorage.setItem('thermalFeedMode',this.feedMode); }catch(e){} sync(); }; }
    sync();
  }
  /* handlers used by the DC template */
  onBaseInput(){ try{ localStorage.setItem('thermalPrinterBaseUrl', this.els.baseUrl.value.trim()); }catch(e){} }
  onSearch(){ this.search=this.els.search.value; this.renderLibrary(); }
  onPing(){ this.ping().catch(e=>this.setStatus(e.message,'err')); }
  onPolaroid(){ this.openPolaroid(); }
  onPrint(){
    if(this._printing) return;
    this._printing=true;
    const btn=document.getElementById('tpPrint');
    if(btn){ btn.disabled=true; btn.style.opacity='.55'; btn.style.cursor='default'; }
    this.printNow().catch(e=>this.setStatus(e.message,'err')).finally(()=>{
      this._printing=false;
      if(btn){ btn.disabled=false; btn.style.opacity=''; btn.style.cursor=''; }
    });
  }
  onTest(){ this.printTest().catch(e=>this.setStatus(e.message,'err')); }
  onDemo(){ this.loadDemo(); }
  onClear(){ this.modules=[]; this.selectedId=null; this.renderPaper(); this.renderInspector(); }
  onSave(){ this.saveJson(); }
  onLoad(){ this.els.loadFile && this.els.loadFile.click(); }
  onLoadFile(e){ const f=e.target.files&&e.target.files[0]; if(f) this.loadJsonFile(f); e.target.value=''; }

  setStatus(text,cls){ const s=this.els.status; if(!s) return; s.textContent=text; s.style.color=cls==='ok'?'var(--good)':cls==='err'?'var(--bad)':'var(--muted)'; if(this.els.dot) this.els.dot.style.background=cls==='err'?'#ff7b72':'#7ee787'; }
  showProgress(pct){ const b=this.els.progress; if(!b) return; b.hidden=false; this.els.progressFill.style.width=Math.max(0,Math.min(100,pct))+'%'; }

  baseUrl(){ let v=(this.els.baseUrl?this.els.baseUrl.value:'').trim(); if(!v) throw new Error('Put the board IP first, e.g. http://192.168.1.123'); if(!/^https?:\/\//i.test(v)) v='http://'+v; return v.replace(/\/$/,''); }

  insertAfterSelected(m){ const idx=this.selectedIndex(); if(idx>=0) this.modules.splice(idx+1,0,m); else this.modules.push(m); this.selectedId=m.id; this.renderPaper(); this.renderInspector(); }

  ensureDropMarker(){ if(!this._dropMarker){ const d=document.createElement('div'); d.style.cssText='height:0;border-top:2px solid var(--accent);margin:-1px 0;pointer-events:none;'; this._dropMarker=d; } return this._dropMarker; }
  clearDropMarker(){ if(this._dropMarker&&this._dropMarker.parentNode) this._dropMarker.parentNode.removeChild(this._dropMarker); }
  addPlugin(id){ const p=PLUGINS.find(x=>x.id===id); if(!p) return; const cfg=typeof p.defaults==='function'?p.defaults():JSON.parse(JSON.stringify(p.defaults)); this.insertAfterSelected(this.withId(Object.assign({type:'plugin',plugin:id},cfg))); }
  deleteModule(id){ const i=this.modules.findIndex(m=>m.id===id); this.modules=this.modules.filter(m=>m.id!==id); if(this.selectedId===id){ const nxt=this.modules[Math.min(i,this.modules.length-1)]; this.selectedId=nxt?nxt.id:null; } this.renderPaper(); this.renderInspector(); }

  numberUpdate(id,key,value){ const n=parseInt(value,10); this.update(id,key,Number.isFinite(n)?n:0); }

  renderLibrary(){
    const root=this.els.library; if(!root) return; root.innerHTML='';
    const q=this.search.trim().toLowerCase();
    const matches=(label)=>!q||label.toLowerCase().includes(q);
    const grid=()=>{ const d=document.createElement('div'); d.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;'; return d; };
    const tile=(glyph,label,onClick,plugin,dragSpec)=>{ const b=document.createElement('button'); b.className='tile'; if(plugin) b.style.borderColor='#2e2a22'; const g=document.createElement('span'); g.className='g'; g.textContent=glyph; if(plugin) g.style.color='var(--accent)'; const l=document.createElement('span'); l.className='l'; l.textContent=label; b.appendChild(g); b.appendChild(l); b.onclick=onClick; if(dragSpec){ b.draggable=true; b.title=(b.title?b.title+' — ':'')+'click or drag onto the paper'; b.addEventListener('dragstart',(e)=>{ this._libDrag=dragSpec; b.style.opacity='.5'; try{ e.dataTransfer.effectAllowed='copy'; e.dataTransfer.setData('text/plain',label); }catch(_){} }); b.addEventListener('dragend',()=>{ this._libDrag=null; b.style.opacity=''; this.clearDropMarker(); }); } return b; };

      const g=grid();
      for(const t of visible) g.appendChild(tile(TYPE_ICON[t]||'\u2022',TYPE_LABEL[t],()=>this.addModule(t),false,{kind:'block',type:t}));
      root.appendChild(g);
    }
    const pvis=PLUGINS.filter(p=>matches(p.name)||(q&&'plugin'.includes(q)));
    if(pvis.length){
      any=true;
      const h=document.createElement('div'); h.className='libcat'; h.textContent='\u26A1 Plugins'; root.appendChild(h);
      const g=grid();
      for(const p of pvis){ const b=tile('\u26A1',p.name,()=>this.addPlugin(p.id),true,{kind:'plugin',id:p.id}); b.title=p.blurb||''; g.appendChild(b); }

  }

  renderPaper(){

      paper.appendChild(wrap);
    }
  }

  refreshWarnings(){ const root=this.els.inspector; if(!root) return; const list=root.querySelectorAll('[data-warn]'); for(const el of list){ const m=this.modules.find(x=>String(x.id)===el.dataset.warn); el.textContent=m?validateModule(m):''; el.style.display=el.textContent?'block':'none'; } }

  buildField(m,spec){
    if(spec.kind==='toggle'){ const w=document.createElement('div'); w.style.cssText='display:flex;align-items:flex-end;'; const b=document.createElement('button'); b.className='tog'+(m[spec.key]?' active':''); b.textContent=spec.label; if(spec.title) b.title=spec.title; b.onclick=()=>{ this.update(m.id,spec.key,!m[spec.key]); b.classList.toggle('active',!!m[spec.key]); }; w.appendChild(b); return w; }
    if(spec.kind==='seg'){ const seg=document.createElement('div'); seg.className='seg'; const cur=String(m[spec.key]); for(const opt of spec.options){ const val=Array.isArray(opt)?String(opt[0]):String(opt); const disp=Array.isArray(opt)?opt[1]:opt; const b=document.createElement('button'); b.textContent=disp; if(Array.isArray(opt)&&opt[2]) b.title=opt[2]; if(cur===val) b.className='active'; b.onclick=()=>{ this.update(m.id,spec.key,val); for(const sib of seg.children) sib.classList.remove('active'); b.classList.add('active'); }; seg.appendChild(b); } return this.field(spec.label, seg, '1 1 150px'); }
    const inp=document.createElement('input'); inp.className='tpf'; inp.type=spec.kind==='number'?'number':'text'; if(spec.min!==undefined) inp.min=spec.min; if(spec.max!==undefined) inp.max=spec.max; inp.value=m[spec.key]==null?'':m[spec.key]; inp.style.width='100%'; if(spec.kind==='number'){ inp.oninput=()=>this.numberUpdate(m.id,spec.key,inp.value); return this.field(spec.label, inp, '0 1 92px'); } inp.oninput=()=>this.update(m.id,spec.key,inp.value); return this.field(spec.label, inp, '100%'); }
  fieldRow(m,specs){ const g=document.createElement('div'); g.style.cssText='display:flex;flex-wrap:wrap;gap:13px 14px;align-items:flex-end;'; for(const s of specs) g.appendChild(this.buildField(m,s)); return g; }
  textAreaField(m,key,labelText){ const ta=document.createElement('textarea'); ta.className='tpf'; ta.value=m[key]||''; ta.oninput=()=>this.update(m.id,key,ta.value); return this.field(labelText, ta); }

  job(){ return { reset:true, modules:this.modules.map(serializeForSave) }; }
  async expandModules(){
    const out=[];
    // The board's per-item "after" gap normally uses ESC J (dot feed), which many
    // cheap clones silently ignore. We express every gap as N "lines" and emit it
    // either as real newlines (works everywhere) or as ESC J dot feeds (exact
    // spacing on printers that support it), per the Feed-mode toggle.
    const mode=this.feedMode||'nl';
    const DOTS_PER_LINE=24;
    const escJ=(dots)=>{ dots=Math.max(0,dots|0); let h=''; while(dots>0){ const n=Math.min(255,dots); h+='1B4A'+n.toString(16).padStart(2,'0').toUpperCase(); dots-=n; } return h; };
    const append=(lines)=>{ lines=parseInt(lines,10)||0; if(lines<=0) return; if(mode==='dots'){ const hex=escJ(lines*DOTS_PER_LINE); if(hex) out.push({type:'raw',hex:hex}); } else { out.push({type:'feed',lines:lines}); } };
    const push=(pm)=>{
      // Codes the board can't print natively (or that the user forced) are
      // rasterised client-side and sent as image modules.
      if(pm.type==='barcode' && (pm.asImage || !NATIVE_BARCODE.has(String(pm.kind||'').toLowerCase()))) pm=barcodeToImageModule(pm);
      else if(pm.type==='qr' && pm.asImage) pm=qrToImageModule(pm);
      if(pm.type==='feed'){ append(pm.lines); return; }
      const after=parseInt(pm.after,10)||0;
      if(after>0){ pm.after=0; out.push(pm); append(after); } else { out.push(pm); }
    };
    for(const m of this.modules){
      if(m.type!=='plugin'){ push(moduleToPrint(m)); continue; }
      const p=pluginFor(m);
      if(!p){ out.push({type:'text',text:'[plugin missing: '+m.plugin+']'}); continue; }
      let built;
      try{ built=await p.build(m); }catch(e){ built=[{type:'text',text:'[plugin '+p.id+' failed: '+(e.message||e)+']'}]; }
      const arr=Array.isArray(built)?built:[built];

      const br=m.brightRegion;
      if(br && (parseFloat(br.amount)||0)!==0 && br.w>0 && br.h>0){
        const amt=Math.max(-150,Math.min(150,parseFloat(br.amount)||0));
        const cxPx=(br.cx||0)*PRINTER_WIDTH, cyPx=(br.cy||0)*h;
        const halfW=Math.max(1,(br.w/2)*PRINTER_WIDTH), halfH=Math.max(1,(br.h/2)*h);
        const th=(br.angle||0)*Math.PI/180, cosT=Math.cos(th), sinT=Math.sin(th);
        const f=Math.max(0,Math.min(1,br.feather==null?0.4:br.feather));
        for(let y=0;y<h;y++){ for(let x=0;x<PRINTER_WIDTH;x++){ const dx=x-cxPx, dy=y-cyPx; const lx=dx*cosT+dy*sinT, ly=-dx*sinT+dy*cosT; const t=Math.max(Math.abs(lx)/halfW,Math.abs(ly)/halfH); if(t<=1){ const wgt=f<=0?1:Math.max(0,Math.min(1,(1-t)/f)); lum[y*PRINTER_WIDTH+x]+=amt*wgt; } } }
      }
      const W=PRINTER_WIDTH;
      for(let y=0;y<h;y++){ for(let x=0;x<W;x++){ const p=y*W+x; let black; if(diffuse){ const oldVal=lum[p]; const newVal=oldVal<threshold?0:255; const err=oldVal-newVal; if(atkinson){ const e=err/8; if(x+1<W) lum[p+1]+=e; if(x+2<W) lum[p+2]+=e; if(y+1<h){ if(x>0) lum[p+W-1]+=e; lum[p+W]+=e; if(x+1<W) lum[p+W+1]+=e; } if(y+2<h) lum[p+2*W]+=e; } else { if(x+1<W) lum[p+1]+=err*7/16; if(y+1<h){ if(x>0) lum[p+W-1]+=err*3/16; lum[p+W]+=err*5/16; if(x+1<W) lum[p+W+1]+=err*1/16; } } black=newVal===0; } else { black=lum[p]<threshold; } if(m.invert) black=!black; const i=p*4; const out=black?0:255; data[i]=data[i+1]=data[i+2]=out; data[i+3]=255; if(black) packed[y*widthBytes+(x>>3)]|=0x80>>(x&7); } }
      ctx.putImageData(image,0,0);
      m.width=PRINTER_WIDTH; m.height=h; m.data=bytesToBase64(packed); m.previewDataUrl=canvas.toDataURL('image/png');
      this.renderPaper(); this.refreshImageInfo(m); this.refreshWarnings();
      // keep the brighten-region tool's backdrop in sync with the latest dithered output
      if(this.selectedId===id && this.els.inspector){ const bb=this.els.inspector.querySelector('img[data-bright-backdrop="'+id+'"]'); if(bb) bb.src=m.previewDataUrl; }
      if(typeof done==='function') done(m);
    };
    img.onerror=()=>{ if(typeof done==='function') done(null); };
    img.src=dataUrl;
  }

  /* ============================================================
     POLAROID — low-friction single-photo print (for the portable kit).
     Take/choose a photo -> auto-brighten + Atkinson dither -> one tap Print.
     Reuses convertDataUrl + printNow with a single transient image module.
     ============================================================ */
  autoBrightnessFor(dataUrl, cb){
    const img=new Image();
    img.onload=()=>{ try{ const s=64; const c=document.createElement('canvas'); c.width=s; c.height=s; const x=c.getContext('2d',{willReadFrequently:true}); x.drawImage(img,0,0,s,s); const d=x.getImageData(0,0,s,s).data; let sum=0,n=0; for(let i=0;i<d.length;i+=4){ sum+=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114; n++; } const mean=sum/Math.max(1,n); cb(Math.max(-100,Math.min(100,Math.round(170-mean)))); }catch(e){ cb(0); } };
    img.onerror=()=>cb(0);
    img.src=dataUrl;
  }
  setPolaroidStatus(text,cls){ const s=this._pol&&this._pol.status; if(!s) return; s.textContent=text||''; s.style.color=cls==='ok'?'var(--good)':cls==='err'?'var(--bad)':'var(--muted)'; }
  async printPolaroid(){
    const m=this._polaroidModule;
    if(!m||!m.data){ this.setPolaroidStatus('Pick a photo first.','err'); return; }
    const saved=this.modules, savedSel=this.selectedId; this.modules=[m];
    this.setPolaroidStatus('Sending to printer…');
    if(this._pol) this._pol.printBtn.disabled=true;
    try{ await this.printNow(); this.setPolaroidStatus('Printed! 🎉  Tap a photo to print another.','ok'); }
    catch(e){ this.setPolaroidStatus(e.message,'err'); }
    finally{ this.modules=saved; this.selectedId=savedSel; if(this._pol) this._pol.printBtn.disabled=false; }
  }
  polaroidSelectFile(file){
    if(!file) return;
    const reader=new FileReader();
    reader.onload=()=>{
      const dataUrl=reader.result;
      this.setPolaroidStatus('Processing…');
      this.autoBrightnessFor(dataUrl,(b)=>{
        const mod=this.withId({ type:'image', dither:'atkinson', brightness:b, threshold:128, maxHeight:1000, scale:100, imgAlign:'center', rotate:0, crop:null, brightRegion:null, invert:false, after:3, filename:file.name||'photo', _sourceDataUrl:dataUrl });
        this._polaroidModule=mod;
        if(this._pol){ this._pol.bright.value=String(b); }
        this.convertDataUrl(dataUrl, mod.id, (mm)=>{
          if(!mm){ this.setPolaroidStatus('Could not read that image.','err'); return; }
          if(this._pol){ this._pol.preview.src=mm.previewDataUrl; this._pol.preview.style.display='block'; this._pol.empty.style.display='none'; this._pol.controls.style.display='flex'; this._pol.printBtn.style.display='block'; }
          this.setPolaroidStatus('Ready — tap Print.','ok');
          if(this._pol&&this._pol.auto.checked) this.printPolaroid();
        });
      });
    };
    reader.onerror=()=>this.setPolaroidStatus('Could not read file.','err');
    reader.readAsDataURL(file);
  }
  polaroidRepack(){
    const m=this._polaroidModule; if(!m||!m._sourceDataUrl) return;
    clearTimeout(this._polRepackT);
    this._polRepackT=setTimeout(()=>{ this.convertDataUrl(m._sourceDataUrl, m.id, (mm)=>{ if(mm&&this._pol) this._pol.preview.src=mm.previewDataUrl; }); }, 70);
  }
  openPolaroid(){
    if(this._pol){ this._pol.overlay.style.display='flex'; return; }
    const pad='max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left))';

    const top=document.createElement('div'); top.style.cssText='display:flex;align-items:center;gap:10px;';
    const ttl=document.createElement('div'); ttl.style.cssText='font-size:16px;font-weight:800;letter-spacing:.02em;'; ttl.textContent='📷 Polaroid';
    const sp=document.createElement('div'); sp.style.flex='1';
    const closeB=document.createElement('button'); closeB.className='btn ghost'; closeB.textContent='Composer ✕'; closeB.onclick=()=>this.closePolaroid();
    top.appendChild(ttl); top.appendChild(sp); top.appendChild(closeB); overlay.appendChild(top);

    const prow=document.createElement('div'); prow.style.cssText='display:flex;align-items:center;gap:8px;';
    const plab=document.createElement('span'); plab.className='flab'; plab.textContent='Printer'; plab.style.flex='0 0 auto';
    const ip=document.createElement('input'); ip.className='tpf'; ip.placeholder='http://192.168.1.123'; ip.style.cssText='flex:1 1 auto;font-family:ui-monospace,monospace;font-size:13px;'; ip.value=(this.els.baseUrl&&this.els.baseUrl.value)||''; ip.oninput=()=>{ if(this.els.baseUrl){ this.els.baseUrl.value=ip.value; } this.onBaseInput(); };
    prow.appendChild(plab); prow.appendChild(ip); overlay.appendChild(prow);
    // hidden file input
    const file=document.createElement('input'); file.type='file'; file.accept='image/*'; file.style.display='none'; file.onchange=()=>{ if(file.files[0]){ this.polaroidSelectFile(file.files[0]); file.value=''; } };
    overlay.appendChild(file);
    // stage
    const stage=document.createElement('div'); stage.style.cssText='flex:1 1 auto;min-height:0;display:flex;align-items:center;justify-content:center;overflow:auto;background:#0b0c10;border:1px solid var(--line2);border-radius:12px;padding:12px;';
    const empty=document.createElement('button'); empty.className='btn'; empty.style.cssText='font-size:17px;font-weight:700;padding:26px 22px;border-style:dashed;border-radius:14px;line-height:1.4;color:var(--text);'; empty.innerHTML='📷&nbsp; Take or choose a photo'; empty.onclick=()=>file.click();
    const preview=document.createElement('img'); preview.style.cssText='display:none;max-width:100%;max-height:100%;width:auto;height:auto;image-rendering:pixelated;background:#fff;border-radius:4px;box-shadow:0 8px 30px rgba(0,0,0,.5);'; preview.onclick=()=>file.click(); preview.title='Tap to choose a different photo';
    stage.appendChild(empty); stage.appendChild(preview); overlay.appendChild(stage);
    // controls (brightness + retake + auto)
    const controls=document.createElement('div'); controls.style.cssText='display:none;flex-direction:column;gap:10px;';
    const brow=document.createElement('div'); brow.style.cssText='display:flex;align-items:center;gap:10px;';
    const bl=document.createElement('span'); bl.className='flab'; bl.textContent='Darker'; bl.style.flex='0 0 auto';
    const bright=document.createElement('input'); bright.type='range'; bright.min='-100'; bright.max='100'; bright.step='1'; bright.value='0'; bright.style.cssText='flex:1 1 auto;accent-color:var(--accent);cursor:pointer;';
    const br=document.createElement('span'); br.className='flab'; br.textContent='Lighter'; br.style.flex='0 0 auto';
    bright.oninput=()=>{ if(this._polaroidModule){ this._polaroidModule.brightness=Math.max(-100,Math.min(100,parseInt(bright.value,10)||0)); this.polaroidRepack(); } };
    brow.appendChild(bl); brow.appendChild(bright); brow.appendChild(br); controls.appendChild(brow);
    const arow=document.createElement('div'); arow.style.cssText='display:flex;align-items:center;gap:10px;';
    const retake=document.createElement('button'); retake.className='btn ghost'; retake.textContent='↻ Choose photo'; retake.onclick=()=>file.click();
    const autoWrap=document.createElement('label'); autoWrap.style.cssText='margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);cursor:pointer;';
    const auto=document.createElement('input'); auto.type='checkbox'; auto.style.accentColor='var(--accent)';
    autoWrap.appendChild(auto); autoWrap.appendChild(document.createTextNode('Auto-print on select'));
    arow.appendChild(retake); arow.appendChild(autoWrap); controls.appendChild(arow);
    overlay.appendChild(controls);
    // footer: status + big print
    const status=document.createElement('div'); status.style.cssText='font-size:13px;color:var(--muted);min-height:18px;text-align:center;'; overlay.appendChild(status);
    const printBtn=document.createElement('button'); printBtn.className='btn primary'; printBtn.style.cssText='display:none;font-size:18px;font-weight:800;padding:16px;border-radius:14px;'; printBtn.textContent='🖨  Print'; printBtn.onclick=()=>this.printPolaroid(); overlay.appendChild(printBtn);
    // Append inside .tp-root so the overlay inherits the --bg/--accent/etc. CSS variables
    // (they're scoped to .tp-root; appending to document.body would leave them undefined).
    (document.querySelector('.tp-root')||document.body).appendChild(overlay);
    this._pol={ overlay, preview, empty, controls, bright, auto, status, printBtn, file };
    this.setPolaroidStatus('Tap above to pick a photo. It auto-brightens for thermal paper.');
  }
  closePolaroid(){ if(this._pol) this._pol.overlay.style.display='none'; if(location.hash==='#polaroid'){ try{ history.replaceState(null,'',location.pathname+location.search); }catch(e){ location.hash=''; } } }

  loadDemo(){
    this.modules=[
      this.withId({ type:'heading', text:'THE DEMO CAFE', size:2, bold:true, rule:true, char:'=', cp437:false, after:1 }),
      this.withId({ type:'section', title:'ORDER', char:'-', cp437:false, after:1 }),
      this.withId({ type:'table', rows:['Item|Qty|Total','Latte|2|$9.00','Croissant|1|$3.50','Cookie|3|$6.00'], header:true, aligns:'LCR', gap:1, encoding:'cp437', after:1 }),
      this.withId({ type:'rule', char:'-', width:32, justify:'left', cp437:false, after:0 }),

      this.withId({ type:'keyvalue', text:'Paid: Card\nServer: Sam', sep:':', leader:'.', encoding:'cp437', after:1 }),

      this.withId({ type:'qr', data:'https://example.com/feedback', size:5, ecc:'M', justify:'center', after:1 }),
      this.withId({ type:'feed', lines:1 }),
      this.withId({ type:'barcode', data:'ORDER0042', kind:'code39', bar_width:2, bar_height:80, hri:'below', justify:'center', after:1 }),
      this.withId({ type:'feed', lines:1 }),
      this.withId({ type:'text', text:'Thank you, come again!', justify:'center', encoding:'cp437', after:1 }),
      this.withId({ type:'feed', lines:1 }),

window.mountThermalComposer = function(els){ return new App(els); };

/* ===== Bootstrap: wire the redesigned shell to the ported engine ===== */
(function () {
  const els = {
    dot:          document.getElementById('tpDot'),
    baseUrl:      document.getElementById('tpBaseUrl'),
    status:       document.getElementById('tpStatus'),
    search:       document.getElementById('tpSearch'),
    library:      document.getElementById('tpLibrary'),
    progress:     document.getElementById('tpProgress'),
    progressFill: document.getElementById('tpProgressFill'),
    paper:        document.getElementById('tpPaper'),
    inspector:    document.getElementById('tpInspector'),
    loadFile:     document.getElementById('tpLoadFile'),
  };

  const app = window.mountThermalComposer(els);

  const on = (id, ev, method) => {
    const node = document.getElementById(id);
    if (node) node.addEventListener(ev, (e) => app[method](e));
  };
  on('tpBaseUrl',  'input',  'onBaseInput');
  on('tpSearch',   'input',  'onSearch');
  on('tpPing',     'click',  'onPing');
  on('tpPolaroid', 'click',  'onPolaroid');
  on('tpPrint',    'click',  'onPrint');
  on('tpDemo',     'click',  'onDemo');
  on('tpClear',    'click',  'onClear');
  on('tpSave',     'click',  'onSave');
  on('tpLoad',     'click',  'onLoad');
  on('tpTest',     'click',  'onTest');
  on('tpLoadFile', 'change', 'onLoadFile');

  /* Mobile only: auto-switch the active pane to match the natural flow.
     Pure view switching (toggles the CSS-only radios) — does not touch the
     engine; on desktop the media query hides the tabs so this is a no-op. */
  (function () {
    const mq = window.matchMedia('(max-width:760px)');
    const showPane = (id) => { const r = document.getElementById(id); if (r) r.checked = true; };
    const lib = document.getElementById('tpLibrary');
    const paper = document.getElementById('tpPaper');
    // Adding a block from the library jumps to the paper so you see it land.
    if (lib) lib.addEventListener('click', (e) => {
      if (mq.matches && e.target.closest('.tile')) showPane('tpViewPaper');
    });
    // Tapping a block on the paper jumps to its editor.
    if (paper) paper.addEventListener('click', (e) => {
      if (mq.matches && e.target.closest('.prevItem')) showPane('tpViewInsp');
    });

    /* Fit the fixed 384px-wide receipt preview to the screen, so the paper is
       never wider than the viewport (no horizontal panning). Only scales down,
       never up, and is cleared on desktop. */
    const PAPER_NATURAL = 432;     // paper width incl. its own padding
    const scroll = paper && paper.closest('.tp-paper-scroll');
    const fitPaper = () => {
      if (!paper) return;
      if (!mq.matches) { paper.style.removeProperty('--tp-fit'); return; }
      // clientWidth is 0 while the paper pane is on an inactive tab — fall back
      // to the viewport so the value is still correct when the user returns.
      const box = (scroll && scroll.clientWidth) ? scroll.clientWidth : window.innerWidth;
      const scale = Math.min(1, Math.max(0.4, (box - 24) / PAPER_NATURAL));
      paper.style.setProperty('--tp-fit', String(scale));
    };
    fitPaper();
    window.addEventListener('resize', fitPaper);
    window.addEventListener('orientationchange', fitPaper);
    (mq.addEventListener ? mq.addEventListener('change', fitPaper) : mq.addListener(fitPaper));
    const paperTab = document.getElementById('tpViewPaper');
    if (paperTab) paperTab.addEventListener('change', fitPaper);
  })();
})();

/* ===== PWA: installable + offline ===== */
(function () {
  // Draw a self-contained app icon to a canvas so we ship no external image files.
  const drawIcon = (size) => {
    const c = document.createElement('canvas'); c.width = c.height = size;
    const x = c.getContext('2d'); const s = size;
    x.fillStyle = '#0e0f13'; x.fillRect(0, 0, s, s);
    const r = s * 0.22, m = s * 0.13, w = s - m * 2;
    x.fillStyle = '#e8893a';
    x.beginPath(); x.moveTo(m + r, m); x.arcTo(m + w, m, m + w, m + w, r); x.arcTo(m + w, m + w, m, m + w, r);
    x.arcTo(m, m + w, m, m, r); x.arcTo(m, m, m + w, m, r); x.closePath(); x.fill();
    // little white "receipt" with text lines + torn bottom
    const rw = w * 0.5, rh = w * 0.62, rx = m + (w - rw) / 2, ry = m + (w - rh) / 2 - w * 0.03;
    x.fillStyle = '#fffdf2'; x.fillRect(rx, ry, rw, rh);
    x.fillStyle = '#1a1206';
    for (let i = 0; i < 4; i++) x.fillRect(rx + rw * 0.16, ry + rh * (0.2 + i * 0.16), rw * 0.68, Math.max(1, s * 0.018));
    const teeth = 6, tw = rw / teeth; x.fillStyle = '#e8893a';
    for (let i = 0; i < teeth; i++) { x.beginPath(); x.moveTo(rx + i * tw, ry + rh); x.lineTo(rx + i * tw + tw / 2, ry + rh - tw * 0.7); x.lineTo(rx + (i + 1) * tw, ry + rh); x.closePath(); x.fill(); }
    return c.toDataURL('image/png');
  };
  try {
    const i192 = drawIcon(192), i512 = drawIcon(512), i180 = drawIcon(180);
    const apple = document.getElementById('tpAppleIcon'); if (apple) apple.href = i180;
    const fav = document.getElementById('tpFavicon'); if (fav) fav.href = i192;
    const manifest = {
      name: 'Thermal Composer', short_name: 'Thermal',
      description: 'Design and print thermal receipts and photos.',
      start_url: './', scope: './', display: 'standalone',
      background_color: '#0e0f13', theme_color: '#0e0f13', orientation: 'portrait',
      icons: [
        { src: i192, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
        { src: i512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
      ],
      shortcuts: [{ name: 'Polaroid (quick photo print)', short_name: 'Polaroid', url: './#polaroid' }]
    };
    const blobUrl = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' }));
    const link = document.createElement('link'); link.rel = 'manifest'; link.href = blobUrl; document.head.appendChild(link);
  } catch (e) { /* icon/manifest generation is best-effort */ }
  // Service worker gives true offline use once installed. Only registers from a secure
  // origin (https / localhost); harmlessly skipped when opened as a local file.
  if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
    window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); });
  }
})();
