# Wi-Fi access point for the portable Polaroid kit.
# Tuned for a Raspberry Pi Zero 1 W (2.4 GHz only).
interface=wlan0
driver=nl80211

# ---- Network name + password (CHANGE THE PASSWORD) ----
ssid=PolaroidKit
wpa_passphrase=polaroid123          # must be at least 8 characters

# ---- Radio: 2.4 GHz, 802.11n ----
hw_mode=g
channel=6
ieee80211n=1
wmm_enabled=1
country_code=US                     # set your 2-letter country code

# ---- Security: WPA2-PSK (AES) ----
auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

macaddr_acl=0
ignore_broadcast_ssid=0
