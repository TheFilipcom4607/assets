# Serves the composer over plain HTTP and relays the printer API to the XIAO,
# so the browser only ever talks to one origin (no mixed-content block, no CORS).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/thermal;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # ---- Printer API relayed to the XIAO ----
    # Update the IP here if your XIAO uses a different address than the
    # dnsmasq static lease (192.168.50.2).
    location = /ping  { proxy_pass http://192.168.50.2; proxy_read_timeout 30s;  }
    location = /test  { proxy_pass http://192.168.50.2; proxy_read_timeout 60s;  }
    location = /print { proxy_pass http://192.168.50.2; proxy_read_timeout 120s; }
}
