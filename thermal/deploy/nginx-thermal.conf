# Serves the composer over plain HTTP and relays the printer API to the XIAO,
# so the browser only ever talks to one origin (no mixed-content block, no CORS).
#
# The "xiao" upstream is filled in automatically by find-printer.sh once the
# printer connects (see /etc/nginx/conf.d/printer-upstream.conf) — you never
# need to know the printer's IP in advance.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/thermal;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Field status/debug page, and never cache the live status file.
    location = /status      { return 302 /status.html; }
    location = /status.json { add_header Cache-Control "no-store"; }

    # ---- Printer API relayed to the auto-discovered XIAO ----
    location = /ping  { proxy_pass http://xiao; proxy_read_timeout 30s;  }
    location = /test  { proxy_pass http://xiao; proxy_read_timeout 60s;  }
    location = /print { proxy_pass http://xiao; proxy_read_timeout 120s; }
}
