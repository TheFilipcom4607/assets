# DHCP + DNS for the Polaroid kit's private network (Pi is 192.168.50.1).
interface=wlan0
bind-interfaces
domain-needed
bogus-priv

# Hand out addresses to phones/tablets that join the AP.
dhcp-range=192.168.50.10,192.168.50.100,255.255.255.0,24h

# Pin the XIAO printer to a fixed address so the nginx proxy always finds it.
# Replace the MAC below with your board's Wi-Fi MAC (see README.md), then make
# sure nginx-thermal.conf proxies to the same IP (192.168.50.2 by default).
dhcp-host=AA:BB:CC:DD:EE:FF,192.168.50.2

# Friendly hostname for the Pi, so you can open http://polaroid.box/ instead
# of the IP. (Opening http://192.168.50.1/ always works too.)
address=/polaroid.box/192.168.50.1
