# DHCP + DNS for the Polaroid kit's private network (Pi is 192.168.50.1).
interface=wlan0
bind-interfaces
domain-needed
bogus-priv

# Hand out addresses to everything that joins the AP (phone, XIAO, etc.).
dhcp-range=192.168.50.10,192.168.50.100,255.255.255.0,24h

# No static lease needed: the printer is found automatically by whichever
# leased device answers /ping (see find-printer.sh + printer-discovery.timer).

# Friendly hostname for the Pi, so you can open http://polaroid.box/ instead
# of the IP. (Opening http://192.168.50.1/ always works too.)
address=/polaroid.box/192.168.50.1
