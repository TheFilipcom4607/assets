<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mogę 6??</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap&subset=latin-ext" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    background: #05030f;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  #lasers, #confetti {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  #lasers { z-index: 1; mix-blend-mode: screen; }
  .stage {
    position: relative;
    z-index: 2;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg.txt { width: 100vw; height: 100vh; }
  text {
    fill: #fff;
    font-family: 'Bebas Neue', Impact, 'Arial Narrow Bold', sans-serif;
    font-weight: 400;
    letter-spacing: 0.5px;
    animation: glow 1.6s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { filter: drop-shadow(0 0 8px #ff2ed1) drop-shadow(0 0 18px #2effd1); }
    to   { filter: drop-shadow(0 0 22px #2e9bff) drop-shadow(0 0 40px #ffe22e); }
  }
  #confetti { z-index: 3; }
  .hint {
    position: absolute;
    bottom: 14px; left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.35);
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 1px;
    font-size: 13px;
    z-index: 4;
    pointer-events: none;
  }
</style>
</head>
<body>
  <canvas id="lasers"></canvas>
  <div class="stage">
    <svg class="txt" viewBox="0 0 100 30" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
      <text x="50" y="15.5" text-anchor="middle" dominant-baseline="central" font-size="15">Mogę 6??</text>
    </svg>
  </div>
  <canvas id="confetti"></canvas>
  <div class="hint">Filip Man</div>

<script>
const DPR = Math.min(window.devicePixelRatio || 1, 2);

function fit(c){
  c.width  = innerWidth  * DPR;
  c.height = innerHeight * DPR;
  c.style.width  = innerWidth + 'px';
  c.style.height = innerHeight + 'px';
}
const laserC = document.getElementById('lasers');
const confC  = document.getElementById('confetti');
const lx = laserC.getContext('2d');
const cx = confC.getContext('2d');
function resizeAll(){ fit(laserC); fit(confC); buildBeams(); }
const colors = ['#ff2ed1','#2effd1','#2e9bff','#ffe22e','#ff5e3a','#b14dff','#3aff7a','#ff3a6e'];

/* ---------- party lasers (more of them) ---------- */
let beams = [];
let origins = [];
function buildBeams(){
  const W = laserC.width, H = laserC.height;
  // origins around the whole perimeter, not just corners
  origins = [
    [0,0],[W,0],[0,H],[W,H],
    [W*0.25,0],[W*0.5,0],[W*0.75,0],
    [W*0.25,H],[W*0.5,H],[W*0.75,H],
    [0,H*0.33],[0,H*0.66],
    [W,H*0.33],[W,H*0.66]
  ];
  const COUNT = 24;
  beams = Array.from({length: COUNT}, (_, i) => ({
    hue: colors[i % colors.length],
    origin: origins[i % origins.length],
    base: Math.random() * Math.PI * 2,
    speed: 0.2 + Math.random() * 0.7,
    spread: 0.4 + Math.random() * 1.1,
    phase: Math.random() * Math.PI * 2
  }));
}
resizeAll();
addEventListener('resize', resizeAll);

function drawLasers(t){
  lx.clearRect(0,0,laserC.width,laserC.height);
  lx.globalCompositeOperation = 'lighter';
  const len = Math.hypot(laserC.width, laserC.height) * 1.2;
  beams.forEach((b, i) => {
    const [ox, oy] = b.origin;
    const ang = b.base + Math.sin(t * 0.001 * b.speed + b.phase) * b.spread;
    const ex = ox + Math.cos(ang) * len;
    const ey = oy + Math.sin(ang) * len;
    const grad = lx.createLinearGradient(ox, oy, ex, ey);
    grad.addColorStop(0, b.hue);
    grad.addColorStop(0.7, b.hue + '00');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    lx.strokeStyle = grad;
    lx.lineWidth = (1.5 + Math.sin(t*0.005 + i) * 1.3) * DPR;
    lx.beginPath();
    lx.moveTo(ox, oy);
    lx.lineTo(ex, ey);
    lx.stroke();
    lx.fillStyle = b.hue;
    lx.beginPath();
    lx.arc(ox, oy, 5 * DPR, 0, Math.PI*2);
    lx.fill();
  });
  lx.globalCompositeOperation = 'source-over';
}

/* ---------- confetti ---------- */
let pieces = [];
function burst(px, py, n = 140){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2;
    const sp = (3 + Math.random()*9) * DPR;
    pieces.push({
      x: px, y: py,
      vx: Math.cos(a)*sp,
      vy: Math.sin(a)*sp - 4*DPR,
      g: 0.15*DPR + Math.random()*0.1*DPR,
      w: (6 + Math.random()*8) * DPR,
      h: (8 + Math.random()*10) * DPR,
      rot: Math.random()*Math.PI,
      vr: (Math.random()-0.5)*0.4,
      color: colors[(Math.random()*colors.length)|0],
      life: 1
    });
  }
  if(pieces.length > 1400) pieces = pieces.slice(-1400);
}
function drawConfetti(){
  cx.clearRect(0,0,confC.width,confC.height);
  pieces.forEach(p => {
    p.vy += p.g;
    p.vx *= 0.99;
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.vr;
    p.life -= 0.004;
    cx.save();
    cx.translate(p.x, p.y);
    cx.rotate(p.rot);
    cx.globalAlpha = Math.max(0, p.life);
    cx.fillStyle = p.color;
    cx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    cx.restore();
  });
  pieces = pieces.filter(p => p.life > 0 && p.y < confC.height + 40);
}

/* ---------- triggers ---------- */
addEventListener('pointerdown', e => burst(e.clientX*DPR, e.clientY*DPR));
setInterval(() => {
  burst(Math.random()*confC.width, confC.height*0.25 + Math.random()*confC.height*0.3, 70);
}, 1400);
addEventListener('load', () => burst(confC.width*0.5, confC.height*0.45, 220));

/* ---------- loop ---------- */
function loop(t){
  drawLasers(t);
  drawConfetti();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
