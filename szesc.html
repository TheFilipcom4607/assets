<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mogę 6??</title>
<style>
  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    background: #05030f;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  #lasers, #confetti {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  #lasers { z-index: 1; mix-blend-mode: screen; }
  .stage {
    position: relative;
    z-index: 2;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg.txt { width: 100vw; height: 100vh; }
  text {
    fill: #fff;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 900;
    paint-order: stroke;
    stroke: rgba(255,255,255,0.0);
    animation: glow 1.6s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { filter: drop-shadow(0 0 8px #ff2ed1) drop-shadow(0 0 18px #2effd1); }
    to   { filter: drop-shadow(0 0 22px #2e9bff) drop-shadow(0 0 40px #ffe22e); }
  }
  #confetti { z-index: 3; }
  .hint {
    position: absolute;
    bottom: 14px; left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.35);
    font-family: Arial, sans-serif;
    font-size: 13px;
    z-index: 4;
    pointer-events: none;
  }
</style>
</head>
<body>
  <canvas id="lasers"></canvas>
  <div class="stage">
    <svg class="txt" viewBox="0 0 100 30" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
      <text x="50" y="15" text-anchor="middle" dominant-baseline="central" font-size="13">Mogę 6??</text>
    </svg>
  </div>
  <canvas id="confetti"></canvas>
  <div class="hint">dotknij po więcej konfetti 🎉</div>

<script>
const DPR = Math.min(window.devicePixelRatio || 1, 2);

/* ---------- shared sizing ---------- */
function fit(c){
  c.width  = innerWidth  * DPR;
  c.height = innerHeight * DPR;
  c.style.width  = innerWidth + 'px';
  c.style.height = innerHeight + 'px';
}
const laserC = document.getElementById('lasers');
const confC  = document.getElementById('confetti');
const lx = laserC.getContext('2d');
const cx = confC.getContext('2d');
function resizeAll(){ fit(laserC); fit(confC); }
resizeAll();
addEventListener('resize', resizeAll);

/* ---------- party lasers ---------- */
const colors = ['#ff2ed1','#2effd1','#2e9bff','#ffe22e','#ff5e3a','#b14dff'];
const beams = Array.from({length: 10}, (_, i) => ({
  hue: colors[i % colors.length],
  base: Math.random() * Math.PI * 2,
  speed: 0.25 + Math.random() * 0.5,
  spread: 0.5 + Math.random() * 0.9
}));
const corners = [
  () => [0,0], () => [laserC.width,0],
  () => [0,laserC.height], () => [laserC.width,laserC.height],
  () => [laserC.width/2,0], () => [laserC.width/2,laserC.height]
];

function drawLasers(t){
  lx.clearRect(0,0,laserC.width,laserC.height);
  lx.globalCompositeOperation = 'lighter';
  beams.forEach((b, i) => {
    const [ox, oy] = corners[i % corners.length]();
    const ang = b.base + Math.sin(t * 0.001 * b.speed) * b.spread;
    const len = Math.hypot(laserC.width, laserC.height) * 1.2;
    const ex = ox + Math.cos(ang) * len;
    const ey = oy + Math.sin(ang) * len;
    const grad = lx.createLinearGradient(ox, oy, ex, ey);
    grad.addColorStop(0, b.hue);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    lx.strokeStyle = grad;
    lx.lineWidth = (2 + Math.sin(t*0.005 + i) * 1.5) * DPR;
    lx.beginPath();
    lx.moveTo(ox, oy);
    lx.lineTo(ex, ey);
    lx.stroke();
    // bright core dot at origin
    lx.fillStyle = b.hue;
    lx.beginPath();
    lx.arc(ox, oy, 6 * DPR, 0, Math.PI*2);
    lx.fill();
  });
  lx.globalCompositeOperation = 'source-over';
}

/* ---------- confetti ---------- */
let pieces = [];
function burst(px, py, n = 140){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2;
    const sp = (3 + Math.random()*9) * DPR;
    pieces.push({
      x: px, y: py,
      vx: Math.cos(a)*sp,
      vy: Math.sin(a)*sp - 4*DPR,
      g: 0.15*DPR + Math.random()*0.1*DPR,
      w: (6 + Math.random()*8) * DPR,
      h: (8 + Math.random()*10) * DPR,
      rot: Math.random()*Math.PI,
      vr: (Math.random()-0.5)*0.4,
      color: colors[(Math.random()*colors.length)|0],
      life: 1
    });
  }
  if(pieces.length > 1200) pieces = pieces.slice(-1200);
}
function drawConfetti(){
  cx.clearRect(0,0,confC.width,confC.height);
  pieces.forEach(p => {
    p.vy += p.g;
    p.vx *= 0.99;
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.vr;
    p.life -= 0.004;
    cx.save();
    cx.translate(p.x, p.y);
    cx.rotate(p.rot);
    cx.globalAlpha = Math.max(0, p.life);
    cx.fillStyle = p.color;
    cx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    cx.restore();
  });
  pieces = pieces.filter(p => p.life > 0 && p.y < confC.height + 40);
}

/* ---------- triggers ---------- */
function partyAt(clientX, clientY){
  burst(clientX*DPR, clientY*DPR);
}
addEventListener('pointerdown', e => partyAt(e.clientX, e.clientY));
// auto-bursts from random spots
setInterval(() => {
  burst(Math.random()*confC.width, confC.height*0.25 + Math.random()*confC.height*0.3, 70);
}, 1400);
// big opening burst
addEventListener('load', () => {
  burst(confC.width*0.5, confC.height*0.45, 220);
});

/* ---------- loop ---------- */
function loop(t){
  drawLasers(t);
  drawConfetti();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
